# 3-node Voltra cluster (advanced — sharded). For most deployments start with
# docker-compose.single.yml or the Dokploy guide; only reach for this once a
# single node is proven insufficient (>15K CCU measured).
#
# Cluster env vars (see CLAUDE.md "Session 50"):
#   VOLTRA_SHARD_ID / VOLTRA_SHARD_COUNT  — identical SHARD_COUNT on every node
#   VOLTRA_PEERS                          — named peer map (shardN=http://host:metrics_port)
#   VOLTRA_CLUSTER_SECRET                 — shared secret, set as a deploy secret
services:
  voltra-0:
    build: .
    restart: unless-stopped
    environment:
      VOLTRA_HOST: "0.0.0.0"
      VOLTRA_PORT: "3000"
      VOLTRA_METRICS_PORT: "3001"
      VOLTRA_SHARD_ID: "0"
      VOLTRA_SHARD_COUNT: "3"
      VOLTRA_PEERS: "shard1=http://voltra-1:3001,shard2=http://voltra-2:3001"
      VOLTRA_CLUSTER_SECRET: "${VOLTRA_CLUSTER_SECRET:-change-this-shared-secret}"
      VOLTRA_API_KEY: "${VOLTRA_API_KEY:-change-this-api-key}"
      VOLTRA_WAL_PATH: "/var/lib/voltra/data/voltra.wal"
      VOLTRA_SNAPSHOT_DIR: "/var/lib/voltra/data/snapshots"
    volumes:
      - voltra-0-data:/var/lib/voltra/data
    ports:
      - "3000:3000"
      - "3001:3001"

  voltra-1:
    build: .
    restart: unless-stopped
    environment:
      VOLTRA_HOST: "0.0.0.0"
      VOLTRA_PORT: "3000"
      VOLTRA_METRICS_PORT: "3001"
      VOLTRA_SHARD_ID: "1"
      VOLTRA_SHARD_COUNT: "3"
      VOLTRA_PEERS: "shard0=http://voltra-0:3001,shard2=http://voltra-2:3001"
      VOLTRA_CLUSTER_SECRET: "${VOLTRA_CLUSTER_SECRET:-change-this-shared-secret}"
      VOLTRA_API_KEY: "${VOLTRA_API_KEY:-change-this-api-key}"
      VOLTRA_WAL_PATH: "/var/lib/voltra/data/voltra.wal"
      VOLTRA_SNAPSHOT_DIR: "/var/lib/voltra/data/snapshots"
    volumes:
      - voltra-1-data:/var/lib/voltra/data

  voltra-2:
    build: .
    restart: unless-stopped
    environment:
      VOLTRA_HOST: "0.0.0.0"
      VOLTRA_PORT: "3000"
      VOLTRA_METRICS_PORT: "3001"
      VOLTRA_SHARD_ID: "2"
      VOLTRA_SHARD_COUNT: "3"
      VOLTRA_PEERS: "shard0=http://voltra-0:3001,shard1=http://voltra-1:3001"
      VOLTRA_CLUSTER_SECRET: "${VOLTRA_CLUSTER_SECRET:-change-this-shared-secret}"
      VOLTRA_API_KEY: "${VOLTRA_API_KEY:-change-this-api-key}"
      VOLTRA_WAL_PATH: "/var/lib/voltra/data/voltra.wal"
      VOLTRA_SNAPSHOT_DIR: "/var/lib/voltra/data/snapshots"
    volumes:
      - voltra-2-data:/var/lib/voltra/data

volumes:
  voltra-0-data:
  voltra-1-data:
  voltra-2-data:
