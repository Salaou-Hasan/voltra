services:
  neondb-1:
    build: .
    environment:
      NEONDB_NODE_ID: "1"
      NEONDB_SHARD_COUNT: "3"
      NEONDB_CLUSTER_PEERS: "neondb-1:3000,neondb-2:3000,neondb-3:3000"
      NEONDB_METRICS_PORT: "3001"
      NEONDB_WS_PORT: "3000"
    volumes:
      - neondb-1-data:/var/lib/neondb
    ports:
      - "3000:3000"
      - "3001:3001"
    restart: unless-stopped

  neondb-2:
    build: .
    environment:
      NEONDB_NODE_ID: "2"
      NEONDB_SHARD_COUNT: "3"
      NEONDB_CLUSTER_PEERS: "neondb-1:3000,neondb-2:3000,neondb-3:3000"
      NEONDB_METRICS_PORT: "3001"
      NEONDB_WS_PORT: "3000"
    volumes:
      - neondb-2-data:/var/lib/neondb
    restart: unless-stopped

  neondb-3:
    build: .
    environment:
      NEONDB_NODE_ID: "3"
      NEONDB_SHARD_COUNT: "3"
      NEONDB_CLUSTER_PEERS: "neondb-1:3000,neondb-2:3000,neondb-3:3000"
      NEONDB_METRICS_PORT: "3001"
      NEONDB_WS_PORT: "3000"
    volumes:
      - neondb-3-data:/var/lib/neondb
    restart: unless-stopped

volumes:
  neondb-1-data:
  neondb-2-data:
  neondb-3-data:
