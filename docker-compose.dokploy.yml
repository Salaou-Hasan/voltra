# ── NeonDB — single-node deployment for Dokploy ──────────────────────────────
#
# In Dokploy: create a "Compose" service, point it at this repo, and set the
# compose path to `docker-compose.dokploy.yml`. Set NEONDB_API_KEY (and any
# other secrets) in the Dokploy Environment tab — do NOT hard-code them here.
#
# Persistence: the `neondb-data` named volume holds WAL + snapshots + backups,
# so data survives container restarts and redeploys.
services:
  neondb:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # ── Networking ──────────────────────────────────────────────────────────
      # 0.0.0.0 is REQUIRED inside a container (the default 127.0.0.1 would only
      # be reachable from inside the container itself).
      NEONDB_HOST: "0.0.0.0"
      NEONDB_PORT: "3000"            # WebSocket / MessagePack game protocol
      NEONDB_METRICS_PORT: "3001"    # metrics + admin console + /healthz
      NEONDB_REDIS_PORT: "6379"      # Redis (RESP) — set to 0 to disable
      NEONDB_PG_PORT: "5432"         # PostgreSQL wire — set to 0 to disable

      # ── Auth (REQUIRED when the port is reachable from the network) ─────────
      # Set this as a secret in Dokploy's Environment tab.
      NEONDB_API_KEY: "${NEONDB_API_KEY}"

      # ── Durable storage on the mounted volume ───────────────────────────────
      NEONDB_WAL_PATH: "/var/lib/neondb/data/neondb.wal"
      NEONDB_SNAPSHOT_DIR: "/var/lib/neondb/data/snapshots"
      NEONDB_BACKUP_DIR: "/var/lib/neondb/data/backups"
      NEONDB_BACKUP_INTERVAL_SECS: "3600"   # hourly backups
      NEONDB_BACKUP_KEEP: "24"              # keep 24 (one day's worth)

      # ── Performance tuning (safe single-node defaults) ──────────────────────
      NEONDB_SUB_TICK_MS: "50"        # 20Hz subscription coalescing
      NEONDB_MAX_CONNECTIONS: "50000"

      # ── Optional: Redis / PG passwords (set as secrets if you expose them) ──
      # NEONDB_REDIS_PASSWORD: "${NEONDB_REDIS_PASSWORD}"
      # NEONDB_PG_PASSWORD: "${NEONDB_PG_PASSWORD}"
    volumes:
      - neondb-data:/var/lib/neondb/data
    ports:
      # Dokploy can also route these through Traefik with a domain (see DEPLOY).
      - "3000:3000"   # game clients connect here
      - "3001:3001"   # ⚠ admin/metrics — firewall this or put behind auth
      - "6379:6379"   # Redis clients (optional)
      - "5432:5432"   # PostgreSQL clients (optional)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  neondb-data:
